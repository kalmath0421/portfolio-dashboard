[theme]
base = "dark"
primaryColor = "#F5A623"
backgroundColor = "#0F1218"
secondaryBackgroundColor = "#171B24"
textColor = "#E6E9EF"
font = "sans serif"

# fontFaces 제거 — 잘못된 woff2 URL 로 403 에러가 발생했었음.
# 폰트는 src/style.py 의 @import url('pretendard.css') 로 로드되며
# 그 방식이 안정적으로 동작 (한글이 정상 그려짐 = Pretendard 로드 성공의 증거).

[browser]
gatherUsageStats = false

[server]
runOnSave = true
