services:
  portfolio:
    build: .
    image: portfolio-dashboard:latest
    container_name: portfolio-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # 데이터(SQLite)는 호스트에 보존 — 컨테이너 재빌드해도 유지
      - ./data:/app/data
      # 세금 규칙은 본인이 수정할 수 있게 별도 마운트
      - ./config:/app/config
    environment:
      - TZ=Asia/Seoul
      # 프로파일 모드: corp (기본) | personal
      # personal 모드는 docker-compose 오버라이드 또는 별도 인스턴스에서 지정.
      - DASHBOARD_PROFILE=${DASHBOARD_PROFILE:-corp}
      # 빈 문자열이면 모드별 기본 타이틀 사용 (profile_config.get_page_title 참고)
      - DASHBOARD_TITLE=${DASHBOARD_TITLE:-}
      - DASHBOARD_SUBTITLE=${DASHBOARD_SUBTITLE:-}
      # 비밀번호는 앱 안에서 등록·관리됨 (DB 의 auth 테이블, bcrypt 해시).
      # 환경변수 비번 방식은 더 이상 사용하지 않음 — 운영자가 평문을 모르게 함.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
